languageCode: en-us
title: 'Plug & Play Dash Cam that fits your car perfectly'
description: 'Get a personalised dashboard camera offer for your vehicle. Fill in your details and we will match you with the best dashcam solution.'
disableKinds: ['taxonomy']

module:
  hugoVersion:
    extended: false
    min: 0.159.0

build:
  buildStats:
    enable: true
  cachebusters:
    - source: layouts/.*
      target: css
    - source: assets/.*\.(js|ts|jsx|tsx)
      target: js
    - source: assets/.*\.(.*)$
      target: $1

defaultContentLanguage: en
defaultContentLanguageInSubdir: false
enableRobotsTXT: true

languages:
  en:
    disabled: false
    languageCode: en-US
    languageDirection: ltr
    languageName: English
    weight: 1
  ru:
    disabled: false
    languageCode: ru-RU
    languageDirection: ltr
    languageName: Russian
    weight: 2
    title: 'Плагин и видеорегистратор, который идеально подходит для вашего автомобиля'
    params:
      description: 'Получите персональное предложение по видеорегистратору для вашего автомобиля. Заполните данные, и мы подберём лучшее решение.'

outputFormats:
  llms:
    mediaType: text/plain
    baseName: llms
    isPlainText: true
    notAlternative: true

outputs:
  home:
    - html
    - rss
    - llms
